<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Midnapore Flood Monitor — RFCR 24 June 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --green-dark:  #0A4A35;
    --green-mid:   #0F6E56;
    --green-light: #1A9E7A;
    --green-pale:  #E6F4EF;
    --amber:       #D97706;
    --amber-pale:  #FEF3C7;
    --red:         #B91C1C;
    --red-pale:    #FEE2E2;
    --slate:       #1E293B;
    --slate-mid:   #475569;
    --slate-light: #94A3B8;
    --border:      #CBD5E1;
    --bg:          #F8FAFC;
    --white:       #FFFFFF;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--slate);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--green-dark);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #34D399;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  header h1 { color: #fff; font-size: 14px; font-weight: 600; letter-spacing: .02em; }
  header .sub { color: #6EE7B7; font-size: 11px; font-family: var(--mono); margin-top: 1px; }
  .date-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: #6EE7B7;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 4px 10px;
    border-radius: 4px;
  }

  /* ── LAYOUT ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  aside {
    width: 220px;
    flex-shrink: 0;
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-section { padding: 16px 12px 8px; }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--slate-light);
    text-transform: uppercase;
    padding: 0 4px;
    margin-bottom: 6px;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 7px 10px;
    border: none;
    border-radius: 6px;
    background: none;
    color: var(--slate-mid);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: background .15s, color .15s;
    margin-bottom: 2px;
  }
  .nav-btn:hover { background: var(--green-pale); color: var(--green-dark); }
  .nav-btn.active { background: var(--green-pale); color: var(--green-dark); font-weight: 500; }
  .nav-icon { font-size: 14px; flex-shrink: 0; }

  .stat-cards { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat-card .s-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--green-mid);
    line-height: 1;
  }
  .stat-card .s-label { font-size: 11px; color: var(--slate-mid); margin-top: 3px; }
  .stat-card.warn .s-num { color: var(--amber); }
  .stat-card.alert .s-num { color: var(--red); }

  /* ── CHAT PANEL ── */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg-wrap { display: flex; gap: 10px; max-width: 820px; }
  .msg-wrap.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-wrap.bot  { align-self: flex-start; }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .avatar.bot  { background: var(--green-dark); color: #fff; }
  .avatar.user { background: var(--slate); color: #fff; }

  .bubble {
    padding: 11px 15px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.6;
    max-width: 700px;
  }
  .user .bubble {
    background: var(--green-dark);
    color: #fff;
    border-radius: 12px 4px 12px 12px;
  }
  .bot .bubble {
    background: var(--white);
    color: var(--slate);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
  }

  /* ── RESPONSE COMPONENTS ── */
  .data-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12.5px; }
  .data-table th {
    background: var(--green-dark);
    color: #fff;
    padding: 7px 10px;
    text-align: left;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .data-table td { padding: 6px 10px; border-bottom: 1px solid var(--green-pale); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:nth-child(even) td { background: var(--bg); }
  .table-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 6px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .sum-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 6px 0;
  }
  .sum-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .sum-card .sum-num {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 600;
    color: var(--green-mid);
    display: block;
    line-height: 1;
  }
  .sum-card .sum-label { font-size: 11px; color: var(--slate-mid); display: block; margin-top: 3px; }
  .sum-card.rain .sum-num { color: var(--green-light); }
  .sum-card.warn .sum-num { color: var(--amber); }
  .sum-card.safe .sum-num { color: var(--red); }

  .safe-tag { color: var(--green-mid); font-weight: 600; }
  .warn-tag { color: var(--amber); font-weight: 600; }
  .danger-tag { color: var(--red); font-weight: 600; }

  .safe-msg { color: var(--green-mid); font-size: 13px; }
  .mt { margin-top: 10px; }

  .damage-card {
    border-left: 3px solid var(--amber);
    background: var(--amber-pale);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .damage-card .dc-title { font-weight: 600; color: var(--amber); font-size: 12px; margin-bottom: 4px; }
  .nil-card {
    font-size: 12.5px;
    color: var(--slate-mid);
    padding: 6px 0;
  }

  .res-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    margin: 6px 0;
  }
  .res-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .rl { display: block; font-size: 11px; color: var(--slate-mid); }
  .rv { display: block; font-size: 14px; font-weight: 600; font-family: var(--mono); color: var(--slate); margin-top: 2px; }

  /* ── CHIPS ── */
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 24px 8px;
    border-top: 1px solid var(--border);
    background: var(--white);
    flex-shrink: 0;
  }
  .chip {
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--white);
    color: var(--slate-mid);
    cursor: pointer;
    font-family: var(--sans);
    transition: all .15s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--green-pale); border-color: var(--green-light); color: var(--green-dark); }

  /* ── INPUT ROW ── */
  .input-row {
    display: flex;
    gap: 10px;
    padding: 12px 24px 14px;
    background: var(--white);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #q {
    flex: 1;
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--sans);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--slate);
    outline: none;
    transition: border-color .15s;
  }
  #q:focus { border-color: var(--green-mid); }
  #q::placeholder { color: var(--slate-light); }
  #send-btn {
    padding: 10px 20px;
    background: var(--green-mid);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  #send-btn:hover { background: var(--green-dark); }

  /* ── TYPING ── */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--slate-light);
    animation: blink 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="pulse-dot"></div>
    <div>
      <h1>Midnapore Flood Impact Monitor</h1>
      <div class="sub">RFCR · Paschim Medinipur · I&amp;WD West Bengal</div>
    </div>
  </div>
  <div class="date-badge">24 JUNE 2026</div>
</header>

<div class="main">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Quick Search</div>
      <button class="nav-btn" onclick="ask('summary')"><span class="nav-icon">📊</span>Summary</button>
      <button class="nav-btn" onclick="ask('highest rainfall')"><span class="nav-icon">🌧️</span>Highest Rainfall</button>
      <button class="nav-btn" onclick="ask('all stations')"><span class="nav-icon">📍</span>All Stations</button>
      <button class="nav-btn" onclick="ask('cumulative rainfall')"><span class="nav-icon">📈</span>Cumulative</button>
      <button class="nav-btn" onclick="ask('zero rain stations')"><span class="nav-icon">🟢</span>Dry Stations</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Districts</div>
      <button class="nav-btn" onclick="ask('purulia rainfall')"><span class="nav-icon">🗺️</span>Purulia</button>
      <button class="nav-btn" onclick="ask('bankura rainfall')"><span class="nav-icon">🗺️</span>Bankura</button>
      <button class="nav-btn" onclick="ask('jhargram rainfall')"><span class="nav-icon">🗺️</span>Jhargram</button>
      <button class="nav-btn" onclick="ask('purba medinipur')"><span class="nav-icon">🗺️</span>Purba Medinipur</button>
      <button class="nav-btn" onclick="ask('paschim medinipur')"><span class="nav-icon">🗺️</span>Paschim Medinipur</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Rivers & Damage</div>
      <button class="nav-btn" onclick="ask('all rivers')"><span class="nav-icon">🌊</span>All Rivers</button>
      <button class="nav-btn" onclick="ask('rising rivers')"><span class="nav-icon">⬆️</span>Rising Rivers</button>
      <button class="nav-btn" onclick="ask('danger level')"><span class="nav-icon">🚨</span>Danger Level</button>
      <button class="nav-btn" onclick="ask('embankment damage')"><span class="nav-icon">⚠️</span>Damage Report</button>
      <button class="nav-btn" onclick="ask('reservoir')"><span class="nav-icon">💧</span>Reservoir</button>
      <button class="nav-btn" onclick="ask('forecast')"><span class="nav-icon">🌦️</span>Forecast</button>
    </div>
    <div class="stat-cards" id="stat-cards">
      <div class="stat-card"><div class="s-num" id="s-total">—</div><div class="s-label">Rain stations</div></div>
      <div class="stat-card warn"><div class="s-num" id="s-rising">—</div><div class="s-label">Rivers rising</div></div>
      <div class="stat-card alert"><div class="s-num" id="s-damage">—</div><div class="s-label">Damage incidents</div></div>
    </div>
  </aside>

  <!-- CHAT -->
  <div class="chat-panel">
    <div id="messages"></div>

    <div class="chip-row">
      <div class="chip" onclick="ask('highest rainfall today')">🌧 Highest rain</div>
      <div class="chip" onclick="ask('rising rivers')">⬆ Rising rivers</div>
      <div class="chip" onclick="ask('embankment damage')">⚠ Damage</div>
      <div class="chip" onclick="ask('reservoir status')">💧 Reservoir</div>
      <div class="chip" onclick="ask('district forecast')">🌦 Forecast</div>
      <div class="chip" onclick="ask('purulia')">📍 Purulia</div>
      <div class="chip" onclick="ask('bankura')">📍 Bankura</div>
      <div class="chip" onclick="ask('all rivers')">🌊 All rivers</div>
    </div>

    <div class="input-row">
      <input id="q" placeholder="Ask about rainfall, rivers, damage, forecast…" onkeydown="if(event.key==='Enter')send()"/>
      <button id="send-btn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
// ── Load sidebar stats ──
fetch('/api/summary').then(r=>r.json()).then(d=>{
  document.getElementById('s-total').textContent  = d.total_stations;
  document.getElementById('s-rising').textContent = d.rising_rivers;
  document.getElementById('s-damage').textContent = d.damage_incidents;
});

// ── Message helpers ──
function addMsg(role, content) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  const icon = role === 'bot' ? '🌊' : '👤';
  wrap.innerHTML = `<div class="avatar ${role}">${icon}</div><div class="bubble">${content}</div>`;
  document.getElementById('messages').appendChild(wrap);
  wrap.scrollIntoView({behavior:'smooth', block:'end'});
  return wrap;
}

function showTyping() {
  return addMsg('bot', '<div class="typing"><span></span><span></span><span></span></div>');
}

// ── Render API response ──
function render(data) {
  if (data.type === 'text') return data.content;

  if (data.type === 'html') return data.content;

  if (data.type === 'table') {
    if (!data.rows || data.rows.length === 0)
      return `<i>No records found.</i>`;
    let html = `<div class="table-title">${data.title}</div>`;
    html += `<table class="data-table"><thead><tr>`;
    data.cols.forEach(c => { html += `<th>${c.replace(/_/g,' ')}</th>`; });
    html += `</tr></thead><tbody>`;
    data.rows.forEach(row => {
      html += '<tr>';
      data.cols.forEach(c => {
        let val = row[c];
        if (val === null || val === undefined) val = 'N/A';
        // colour trend column
        if (c === 'trend') {
          const cls = val==='Rising'?'warn-tag':val==='Falling'?'safe-tag':'';
          val = `<span class="${cls}">${val}</span>`;
        }
        // colour rainfall numbers
        if ((c==='rainfall_24hr_mm') && parseFloat(val) >= 64.5) {
          val = `<span class="warn-tag">${val}</span>`;
        }
        html += `<td>${val}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    if (data.extra) html += data.extra;
    return html;
  }

  if (data.type === 'damage') {
    let html = '';
    let hasReal = false;
    data.rows.forEach(r => {
      const desc = r.description || '';
      if (desc.toLowerCase().includes('nil') || !desc) {
        html += `<div class="nil-card">✅ <b>${r.district}</b> — No damage</div>`;
      } else {
        hasReal = true;
        html += `<div class="damage-card">
          <div class="dc-title">⚠ ${r.district} · Block: ${r.block || 'N/A'}</div>
          <div>${desc}</div>
        </div>`;
      }
    });
    return html;
  }

  return JSON.stringify(data);
}

// ── Send message ──
async function ask(question) {
  if (!question.trim()) return;
  document.getElementById('q').value = '';
  addMsg('user', question);
  const typing = showTyping();
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question})
    });
    const data = await resp.json();
    typing.remove();
    addMsg('bot', render(data));
  } catch(e) {
    typing.remove();
    addMsg('bot', '⚠ Could not connect to server. Is Flask running?');
  }
}

function send() {
  const q = document.getElementById('q').value.trim();
  if (q) ask(q);
}

// ── Welcome message ──
addMsg('bot', `Welcome to the <b>Midnapore Flood Impact Monitor</b>.<br>
Data is read directly from your Excel files for <b>24 June 2026</b>.<br><br>
This chatbot covers <b>41 rain gauge stations</b>, <b>24 river gauges</b>, embankment damage, 
district forecasts, and reservoir status across 5 districts.<br><br>
Use the sidebar, chips below, or type your question to get started.`);
</script>
</body>
</html>
